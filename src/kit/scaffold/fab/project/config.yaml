project:
  name: "{PROJECT_NAME}"
  description: "{PROJECT_DESCRIPTION}"

# Directories containing implementation code (relative to repo root).
source_paths:
  - {SOURCE_PATHS}

# Pathspec exclusions used by /git-pr to compute the "true impact" line counts
# in the PR body (lines added/deleted excluding noise directories like fab/ and
# docs/). Optional — when absent or empty, the impact block is omitted.
true_impact_exclude: [fab/, docs/]

# Glob/pathspec patterns identifying test files. Used by the true-impact
# breakdown to attribute lines to tests vs. implementation (impl = total − tests).
# Language-specific — no kit default. Patterns are :(glob) magic pathspecs, so
# `**` matches across directories and `*` does NOT match `/`. Anchor to your
# language's test convention rather than a bare substring (a substring like
# `*test*` miscounts production code such as `attestation.go` or `latest.go`).
# When absent/empty, the breakdown collapses to a single total line.
#
# Examples (uncomment/adapt the line for your stack):
#   - "**/*_test.go"                  # Go   — `_test.go` suffix
#   - "**/test_*.py"                  # Python (pytest) — `test_` prefix
#   - "**/*.spec.ts"                  # JS/TS (Jest/Vitest) — `.spec` infix
#   - "**/*.test.ts"                  # JS/TS — `.test` infix
#   - "**/src/test/**"                # Java/Kotlin (Maven/Gradle) — test source root
{TEST_PATHS}

# The review stage validates code against the plan.md ## Acceptance section.
# Built-in categories: functional_completeness, behavioral_correctness,
# scenario_coverage, edge_cases, security.
# Add your own — each becomes an extra subsection under plan.md ## Acceptance.
# Example: [accessibility, performance, i18n]
# (Config key remains `checklist.extra_categories` for backward compatibility.)
checklist:
  extra_categories: []

agent:
  # Base command for spawning agent sessions in scripts and operators.
  # Shell expansions (e.g., $(basename "$(pwd)")) expand at invocation time.
  spawn_command: 'claude --dangerously-skip-permissions --effort xhigh -n "$(basename "$(pwd)")"'
