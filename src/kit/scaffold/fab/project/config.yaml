# Full reference of all available options: fab config reference
project:
  name: "{PROJECT_NAME}"
  description: "{PROJECT_DESCRIPTION}"

# Directories containing implementation code (relative to repo root).
source_paths:
  - {SOURCE_PATHS}

# Pathspec exclusions used by /git-pr to compute the "true impact" line counts
# in the PR body (lines added/deleted excluding noise directories like fab/ and
# docs/). Optional — when absent or empty, the impact block is omitted.
true_impact_exclude: [fab/, docs/]

# Glob/pathspec patterns identifying test files. Used by the true-impact
# breakdown to attribute lines to tests vs. implementation (impl = total − tests).
# Language-specific — no kit default. Patterns are :(glob) magic pathspecs, so
# `**` matches across directories and `*` does NOT match `/`. Anchor to your
# language's test convention rather than a bare substring (a substring like
# `*test*` miscounts production code such as `attestation.go` or `latest.go`).
# When absent/empty, the breakdown collapses to a single total line.
#
# Examples (uncomment/adapt the line for your stack):
#   - "**/*_test.go"                  # Go   — `_test.go` suffix
#   - "**/test_*.py"                  # Python (pytest) — `test_` prefix
#   - "**/*.spec.ts"                  # JS/TS (Jest/Vitest) — `.spec` infix
#   - "**/*.test.ts"                  # JS/TS — `.test` infix
#   - "**/src/test/**"                # Java/Kotlin (Maven/Gradle) — test source root
{TEST_PATHS}

# The review stage validates code against the plan.md ## Acceptance section.
# Built-in categories: functional_completeness, behavioral_correctness,
# scenario_coverage, edge_cases, security.
# Add your own — each becomes an extra subsection under plan.md ## Acceptance.
# Example: [accessibility, performance, i18n]
# (Config key remains `checklist.extra_categories` for backward compatibility.)
checklist:
  extra_categories: []

# providers — named agent invocation grammars. Each provider MAY carry a
# session_command (opens an interactive session: fab operator / fab batch /
# fab agent) and/or a dispatch_command (runs one headless stage task via fab
# dispatch, which pipes the stage prompt to the command's STDIN; ABSENT →
# native Agent-tool dispatch). The two are NOT merged. {model}/{effort}
# placeholders are substituted from the resolved tier profile (the built-in
# claude session_command below is templated this way); a command carrying NO
# placeholder instead gets --model/--effort appended. Provider names are opaque,
# user-chosen strings. See: fab config reference.
#
# claude is the built-in default (session_command shown live). codex and gemini
# are a commented starter TEMPLATE — uncomment and adapt to add that provider.
# Anything whose uncommenting changes default behavior ships commented: claude's
# dispatch_command (flips claude native→headless CLI dispatch) and the opt-in
# codex/gemini blocks.
#
# Per-provider notes (kept out of the blocks below so uncommenting a whole block
# yields valid YAML — strip the leading '# ' from every line of a block):
#   claude.dispatch_command — claude -p reads the prompt from stdin; uncommenting
#     runs claude's stages as headless CLI processes instead of native sub-agents.
#   codex — codex exec reads the prompt from stdin. Substitute a current model ID
#     for {model} (e.g. gpt-5.3-codex); {model}/{effort} come from the tier.
#   gemini — no {effort} (the gemini CLI has no reasoning-effort flag) and no -p:
#     gemini's -p takes prompt TEXT (appended after stdin), whereas fab dispatch
#     pipes the prompt to stdin, which gemini reads as the prompt in non-TTY mode.
providers:
  claude:
    session_command: 'claude --dangerously-skip-permissions -n "$(basename "$(pwd)")" --model {model} --effort {effort}'
    # dispatch_command: 'claude -p --dangerously-skip-permissions --model {model} --effort {effort}'
  # codex:
  #   session_command: 'codex -m {model} -c model_reasoning_effort={effort}'
  #   dispatch_command: 'codex exec -m {model} -c model_reasoning_effort={effort}'
  # gemini:
  #   session_command: 'gemini -m {model}'
  #   dispatch_command: 'gemini -m {model}'   # no {effort} flag; no -p (fab dispatch pipes the prompt to stdin)

# agent.tiers — per-stage model override. A tier is a named {provider, model,
# effort} profile (the invocation command lives on the provider, above). fab-kit
# owns the FIXED stage→tier mapping (intake→default, apply/review-pr/hydrate→
# doing, review→review, ship→fast; default also governs fab batch / fab agent,
# and operator governs fab operator). Omit any tier (or the whole block) to use
# fab-kit's built-in default; an omitted field inherits the `default` tier.
# Provider is written explicitly on every line as documented style.
agent:
  tiers:
    default:  { provider: claude, model: claude-fable-5,  effort: xhigh }
    operator: { provider: claude, model: claude-sonnet-5, effort: medium }
    doing:    { provider: claude, model: claude-opus-4-8, effort: xhigh }
    review:   { provider: claude, model: claude-fable-5,  effort: xhigh }
    fast:     { provider: claude, model: claude-sonnet-5, effort: low }
