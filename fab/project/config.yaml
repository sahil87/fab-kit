agent:
    spawn_command: claude --dangerously-skip-permissions --effort xhigh -n "$(basename "$(pwd)")"
checklist:
    extra_categories:
        - documentation_accuracy
        - cross_references
fab_version: 2.7.1
project:
    description: FAB Kit — Tooling for Specification-Driven Development
    linear_workspace: null
    name: fab-kit
review_tools:
    claude: true
    codex: true
    copilot: true
source_paths:
    - src/
test_paths:
    - '**/*_test.go'
true_impact_exclude:
    - fab/
    - docs/
