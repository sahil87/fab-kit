agent:
    tiers:
        default:
            effort: xhigh
            model: claude-fable-5
            provider: claude
        doing:
            effort: xhigh
            model: claude-opus-4-8
            provider: claude
        fast:
            effort: low
            model: claude-sonnet-5
            provider: claude
        operator:
            effort: medium
            model: claude-sonnet-5
            provider: claude
        review:
            effort: xhigh
            model: claude-fable-5
            provider: claude
checklist:
    extra_categories:
        - documentation_accuracy
        - cross_references
fab_version: 2.13.0
project:
    description: FAB Kit — Tooling for Specification-Driven Development
    linear_workspace: null
    name: fab-kit
providers:
    claude:
        session_command: claude --dangerously-skip-permissions -n "$(basename "$(pwd)")"
source_paths:
    - src/
test_paths:
    - '**/*_test.go'
true_impact_exclude:
    - fab/
    - docs/
