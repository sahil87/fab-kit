name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    # workflow_dispatch must run from main; tag-push is allowed from any ref.
    if: github.event_name == 'push' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      # Checkout repository
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}

      # On manual dispatch, run scripts/release.sh — it bumps
      # src/kit/VERSION, commits, tags, and pushes both the commit and tag.
      - name: Create tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        id: create_tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          ./scripts/release.sh "${{ inputs.bump }}"
          echo "tag=$(git tag --sort=-v:refname | head -1)" >> "$GITHUB_OUTPUT"

      - name: Resolve release tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ steps.create_tag.outputs.tag }}"
          else
            tag="${{ github.ref_name }}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      # Set up Go toolchain
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.22'

      # Install just command runner
      - uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2

      # Full build pipeline (same steps you'd run locally)
      - name: Assemble dist/kit/
        run: just dist-kit

      - name: Build all targets
        run: just build-all

      # Dump the rich `fab` CLI help tree to the frozen shll.ai contract JSON and
      # open an auto-merging PR into sahil87/shll.ai. The dump + validate portion
      # is FATAL (a malformed dump is a real fab-kit bug); the PR portion is
      # NON-FATAL (a shll.ai outage or token issue must not block fab-kit's release).
      - name: Help-dump → shll.ai
        env:
          SHLLAI_TOKEN: ${{ secrets.SHLLAI_TOKEN }}
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"

          # 1. Dump from the freshly built linux/amd64 binary so `version` is the
          #    real ldflags-injected value. FATAL on failure.
          mkdir -p help
          ./dist/bin/fab-go-linux-amd64 help-dump > help/fab-kit.json

          # 2. Validate the contract. FATAL on failure.
          jq -e '.tool=="fab" and .schema_version==1 and (.version|length>0) and (.root|type=="object")' help/fab-kit.json

          # 3. Open an auto-merging PR into sahil87/shll.ai. NON-FATAL: any failure
          #    below warns but does not fail the release.
          (
            set -euo pipefail
            if [ -z "${SHLLAI_TOKEN:-}" ]; then
              echo "::warning::SHLLAI_TOKEN not set; skipping shll.ai PR"
              exit 0
            fi
            branch="help-dump/fab-kit-${version}"
            git clone "https://x-access-token:${SHLLAI_TOKEN}@github.com/sahil87/shll.ai.git" /tmp/shllai
            mkdir -p /tmp/shllai/help
            cp help/fab-kit.json /tmp/shllai/help/fab-kit.json
            cd /tmp/shllai
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b "$branch"
            git add help/fab-kit.json
            # Skip only when the staged file is byte-identical to shll.ai's copy.
            # In practice `captured_at` is a fresh timestamp each run, so a normal
            # release always differs and opens a PR (intended per-release refresh —
            # see the change's intake assumption #8 / Open Question on churn). This
            # guard therefore fires only on a same-version re-run within the same
            # second, and as a cheap safety net against a literal no-op commit.
            if git diff --cached --quiet; then
              echo "help/fab-kit.json unchanged; skipping shll.ai PR"
              exit 0
            fi
            git commit -m "fab-kit: refresh command reference (v${version})"
            git push -u origin "$branch"
            GH_TOKEN="$SHLLAI_TOKEN" gh pr create --repo sahil87/shll.ai \
              --base main --head "$branch" \
              --title "fab-kit: command reference v${version}" \
              --body "Automated CLI help-dump from fab-kit release v${version}."
            GH_TOKEN="$SHLLAI_TOKEN" gh pr merge --repo sahil87/shll.ai --auto --squash "$branch"
          ) || echo "::warning::shll.ai PR step failed; release continues"

      - name: Package kit archives
        run: just package-kit

      - name: Package brew archives
        run: just package-brew

      - name: Generate release notes
        run: just release-notes "${{ steps.version.outputs.tag }}"

      - name: Generate Homebrew formula
        run: just brew-formula "${{ steps.version.outputs.tag }}"

      # Upload — these steps need tokens, so they stay CI-only
      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Fab Kit ${{ steps.version.outputs.tag }}" \
            --notes-file dist/release-notes.md \
            dist/kit-darwin-arm64.tar.gz \
            dist/kit-darwin-amd64.tar.gz \
            dist/kit-linux-arm64.tar.gz \
            dist/kit-linux-amd64.tar.gz \
            dist/brew-darwin-arm64.tar.gz \
            dist/brew-darwin-amd64.tar.gz \
            dist/brew-linux-arm64.tar.gz \
            dist/brew-linux-amd64.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          version="${{ steps.version.outputs.version }}"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/sahil87/homebrew-tap.git" /tmp/tap
          cp dist/fab-kit.rb /tmp/tap/Formula/fab-kit.rb
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/fab-kit.rb
          git commit -m "fab-kit ${version}"
          git push
